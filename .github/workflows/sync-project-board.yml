name: Sync TODO List to Project Board

on:
  push:
    paths:
      - 'todo_list.json'
      - '.github/workflows/sync-project-board.yml'
  pull_request:
    paths:
      - 'todo_list.json'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-todo-list:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Sync TODO list to issues
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python sync_to_github.py
    
    - name: Generate TODO Summary Report
      run: |
        echo "# 📋 TODO List Status Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        python todo_manager.py summary | sed 's/^//' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Recent Tasks" >> $GITHUB_STEP_SUMMARY
        python todo_manager.py list | head -20 >> $GITHUB_STEP_SUMMARY